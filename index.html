<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Personal Site</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.6;
      transition: background-color 0.3s, color 0.3s;
    }

    h1 { color: #336699; }
    nav a { margin: 0 1rem; }
    section { margin-top: 2rem; }

    /* DARK MODE */
    body.dark {
      background-color: #1e1e1e;
      color: #f1f1f1;
    }

    body.dark h1 {
      color: #8ab4f8;
    }

    /* TOGGLE SWITCH */
    #theme-toggle-button {
      font-size: 17px;
      display: inline-block;
      width: 7em;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    #toggle {
      opacity: 0;
      width: 0;
      height: 0;
    }

    #container,
    #stars,
    #button,
    #sun,
    #moon,
    #cloud {
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    #toggle:checked + svg #container {
      fill: #2b4360;
    }

    #toggle:checked + svg #button {
      transform: translate(28px, 0);
    }

    #sun { opacity: 1; }
    #toggle:checked + svg #sun { opacity: 0; }

    #moon { opacity: 0; }
    #toggle:checked + svg #moon { opacity: 1; }

    #cloud { opacity: 1; }
    #toggle:checked + svg #cloud { opacity: 0; }

    #stars { opacity: 0; }
    #toggle:checked + svg #stars { opacity: 1; }
  </style>
</head>

<body>

  <!-- THEME TOGGLE -->
  <label id="theme-toggle-button">
    <input type="checkbox" id="toggle">

    <svg viewBox="0 0 64 32" width="100%" height="100%">
      <rect id="container" width="64" height="32" rx="16" fill="#87ceeb"/>

      <!-- Sun -->
      <circle id="sun" cx="16" cy="16" r="6" fill="#FFD700"/>

      <!-- Moon -->
      <circle id="moon" cx="48" cy="16" r="6" fill="#FFF"/>

      <!-- Button -->
      <circle id="button" cx="16" cy="16" r="10" fill="#fff"/>

      <!-- Clouds -->
      <ellipse id="cloud" cx="40" cy="20" rx="10" ry="5" fill="#fff"/>

      <!-- Stars -->
      <g id="stars">
        <circle cx="50" cy="10" r="1.5" fill="#fff"/>
        <circle cx="55" cy="15" r="1" fill="#fff"/>
      </g>
    </svg>
  </label>

  <h1>Welcome Bubu</h1>

  <nav>
    <a href="#finance">Finance</a>
    <a href="#faith">Faith</a>
    <a href="#architecture">Architecture</a>
  </nav>

  <section id="finance">
    <h2>Finance</h2>
    <p>Here I’ll share everything I know about managing money, investing, and budgeting.</p>
  </section>

  <section id="faith">
    <h2>Faith</h2>
    <p>Reflections, beliefs, and spiritual lessons I’ve learned.</p>
  </section>

  <section id="architecture">
    <h2>Architecture</h2>
    <p>My thoughts on design, form, function, and history in architecture.</p>
  </section>

  <script>
    const toggle = document.getElementById('toggle');

    toggle.addEventListener('change', () => {
      document.body.classList.toggle('dark', toggle.checked);
    });
  </script>

</body>
</html>
