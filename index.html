<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Dashboard</title>

<style>
body {
  margin: 0;
  background: #f4f6fb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.layout {
  display: flex;
  gap: 60px;
  align-items: flex-start;
}

.inputs {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.expense-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 200px;
}

.chart-box {
  position: relative;
  width: 340px;
  height: 340px;
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.center h2 {
  margin: 0;
}
</style>
</head>

<body>

<div class="layout">

  <div class="inputs">
    <input id="income" type="number" placeholder="Income" />
    <div id="expensesContainer" class="expense-list"></div>
  </div>

  <div class="chart-box">
    <canvas id="chart" width="340" height="340"></canvas>

    <div class="center">
      <h2 id="incomeText">0</h2>
      <span>Income</span>
    </div>
  </div>

</div>

<script>
const ctx = document.getElementById("chart").getContext("2d");
const incomeInput = document.getElementById("income");
const incomeText = document.getElementById("incomeText");
const container = document.getElementById("expensesContainer");

const colors = [
"#243e92","#3c59c0","#5a7fe0",
"#10312a","#174741","#0f615c",
"#2ca153","#218f4a","#55cc80",
"#fe7f07","#d46f05","#ffa03a",
"#c93a3a","#e55252","#ff7a7a"
];

const MAX = 15;
let expenseInputs = [];

/* initial */
for (let i = 0; i < 4; i++) addExpense();

function addExpense() {
  if (expenseInputs.length >= MAX) return;

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "Expense";

  input.addEventListener("input", () => {
    handleAutoAdd();
    update();
  });

  container.appendChild(input);
  expenseInputs.push(input);
}

function handleAutoAdd() {
  if (expenseInputs.length >= MAX) return;
  const last = expenseInputs[expenseInputs.length - 1];
  if (last.value !== "") addExpense();
}

/* DRAW */
function draw() {
  const income = parseFloat(incomeInput.value) || 0;
  const values = expenseInputs.map(i => parseFloat(i.value) || 0);

  const center = 170;
  const baseRadius = 120;
  const thickness = 40;
  const overflowRadius = baseRadius + 30;

  ctx.clearRect(0,0,340,340);

  // base leftover
  ctx.beginPath();
  ctx.arc(center, center, baseRadius, 0, Math.PI * 2);
  ctx.strokeStyle = "#dfeded";
  ctx.lineWidth = thickness;
  ctx.stroke();

  if (income <= 0) {
    incomeText.textContent = "0";
    return;
  }

  let start = -Math.PI / 2;
  const gap = 0.02;

  let used = 0;

  values.forEach((value, i) => {
    if (value <= 0) return;

    let inside = Math.max(0, Math.min(value, income - used));
    let overflow = Math.max(0, value - inside);

    // --- INSIDE PART ---
    if (inside > 0) {
      let angle = (inside / income) * Math.PI * 2;

      if (angle > gap) {
        ctx.beginPath();
        ctx.arc(
          center,
          center,
          baseRadius,
          start + gap/2,
          start + gap/2 + (angle - gap)
        );
        ctx.strokeStyle = colors[i % colors.length];
        ctx.lineWidth = thickness;
        ctx.stroke();
      }

      start += angle;
      used += inside;
    }

    // --- OVERFLOW PART (OUTER RING) ---
    if (overflow > 0) {
      let overflowAngle = (overflow / income) * Math.PI * 2;

      ctx.beginPath();
      ctx.arc(
        center,
        center,
        overflowRadius,
        start,
        start + overflowAngle
      );
      ctx.strokeStyle = colors[i % colors.length];
      ctx.lineWidth = 12;
      ctx.stroke();

      start += overflowAngle;
    }
  });

  incomeText.textContent = income.toLocaleString();
}

function update() {
  draw();
}

incomeInput.addEventListener("input", update);

draw();
</script>

</body>
</html>
