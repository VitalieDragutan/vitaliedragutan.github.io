<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Finance Dashboard</title>

<style>
body {
  margin: 0;
  background: #f4f6fb;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
}

/* LAYOUT */
.layout {
  display: flex;
  gap: 40px;
  padding: 20px;
  justify-content: center;
  flex-wrap: wrap;
}

/* INPUTS */
.inputs {
  display: flex;
  flex-direction: column;
  gap: 10px;
  width: 220px;   /* slightly smaller */;
}

/* SCROLLABLE EXPENSE LIST */
* {
  box-sizing: border-box;
}

.expense-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 250px;
  overflow-y: auto;
  overflow-x: hidden; /* removes bottom scrollbar */
  padding-right: 5px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  width: 100%;
  max-width: 200px; /* caps input width */
}

/* CHART */
.chart-box {
  position: relative;
  width: 100%;
  max-width: 320px;
  aspect-ratio: 1;
}

canvas {
  width: 100%;
  height: 100%;
}

.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

/* MOBILE */
@media (max-width: 600px) {
  .layout {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>

<body>

<div class="layout">

  <div class="inputs">
    <input id="income" type="number" placeholder="Income" />
    <div id="expensesContainer" class="expense-list"></div>
  </div>

  <div class="chart-box">
    <canvas id="chart"></canvas>

    <div class="center">
      <h2 id="incomeText">0</h2>
      <div>Income</div>
    </div>
  </div>

</div>

<script>
const canvas = document.getElementById("chart");
const ctx = canvas.getContext("2d");
const incomeInput = document.getElementById("income");
const incomeText = document.getElementById("incomeText");
const container = document.getElementById("expensesContainer");

const colors = [
"#243e92","#3c59c0","#5a7fe0",
"#10312a","#174741","#0f615c",
"#2ca153","#218f4a","#55cc80",
"#fe7f07","#d46f05","#ffa03a",
"#c93a3a","#e55252","#ff7a7a"
];

const MAX = 15;
let expenseInputs = [];

/* INIT */
for (let i = 0; i < 4; i++) addExpense();

function addExpense() {
  if (expenseInputs.length >= MAX) return;

  const input = document.createElement("input");
  input.type = "number";
  input.placeholder = "Expense";

  input.addEventListener("input", () => {
    handleAutoAdd();
    update();
  });

  container.appendChild(input);
  expenseInputs.push(input);
}

function handleAutoAdd() {
  if (expenseInputs.length >= MAX) return;
  const last = expenseInputs[expenseInputs.length - 1];
  if (last.value !== "") addExpense();
}

/* RESIZE */
function resizeCanvas() {
  const size = canvas.clientWidth;
  const dpr = window.devicePixelRatio || 1;

  canvas.width = size * dpr;
  canvas.height = size * dpr;

  ctx.scale(dpr, dpr);
}

/* DRAW */
function draw() {
  resizeCanvas();

  const size = canvas.width;
  const center = size / 2;

  const income = parseFloat(incomeInput.value) || 0;
  const values = expenseInputs.map(i => parseFloat(i.value) || 0);

  const baseRadius = size * 0.35;
  const thickness = size * 0.12;
  const overflowRadius = baseRadius + thickness;

  ctx.setTransform(1, 0, 0, 1, 0, 0); // reset scaling each draw
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // base
  ctx.beginPath();
  ctx.arc(center, center, baseRadius, 0, Math.PI * 2);
  ctx.strokeStyle = "#dfeded";
  ctx.lineWidth = thickness;
  ctx.stroke();

  if (income <= 0) {
    incomeText.textContent = "0";
    return;
  }

  let start = -Math.PI / 2;
  const gap = 0.025; // slightly bigger for visibility
  let used = 0;

  values.forEach((value, i) => {
    if (value <= 0) return;

    let inside = Math.max(0, Math.min(value, income - used));
    let overflow = Math.max(0, value - inside);

    // INSIDE
    if (inside > 0) {
      let angle = (inside / income) * Math.PI * 2;

      if (angle > gap) {
        ctx.beginPath();
        ctx.arc(
          center,
          center,
          baseRadius,
          start + gap/2,
          start + gap/2 + (angle - gap)
        );
        ctx.strokeStyle = colors[i % colors.length];
        ctx.lineWidth = thickness;
        ctx.stroke();
      }

      start += angle;
      used += inside;
    }

    // OVERFLOW (WITH SAME GAP LOGIC)
    if (overflow > 0) {
      let angle = (overflow / income) * Math.PI * 2;

      if (angle > gap) {
        ctx.beginPath();
        ctx.arc(
          center,
          center,
          overflowRadius,
          start + gap/2,
          start + gap/2 + (angle - gap)
        );
        ctx.strokeStyle = colors[i % colors.length];
        ctx.lineWidth = thickness * 0.3;
        ctx.stroke();
      }

      start += angle;
    }
  });

  incomeText.textContent = income.toLocaleString();
}

function update() {
  draw();
}

window.addEventListener("resize", draw);
incomeInput.addEventListener("input", update);

draw();
</script>

</body>
</html>
