<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Personal Site</title>
  <style>
/* Theme toggle styles */
#theme-toggle-button {
  font-size: 17px;
  position: relative;
  display: inline-block;
  width: 7em;
  cursor: pointer;
}

#toggle {
  opacity: 0;
  width: 0;
  height: 0;
}

#container,
#patches,
#stars,
#button,
#sun,
#moon,
#cloud {
  transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
}

/* night sky background */
#toggle:checked + svg #container {
  fill: #2b4360;
}

/* move button */
#toggle:checked + svg #button {
  transform: translate(28px, 2.333px);
}

/* sun/moon toggle */
#sun { opacity: 1; }
#toggle:checked + svg #sun { opacity: 0; }

#moon { opacity: 0; }
#toggle:checked + svg #moon { opacity: 1; }

/* clouds/stars */
#cloud { opacity: 1; }
#toggle:checked + svg #cloud { opacity: 0; }

#stars { opacity: 0; }
#toggle:checked + svg #stars { opacity: 1; }

/* Optional: dark mode styles */
body.dark {
  background-color: #1e1e1e;
  color: #f1f1f1;
}

body.dark h1 {
  color: #8ab4f8;
}
  </style>
</head>
<body>
  <h1>Welcome Bubu</h1>
  <nav>
    <a href="#finance">Finance</a>
    <a href="#faith">Faith</a>
    <a href="#architecture">Architecture</a>
  </nav>

  <section id="finance">
    <h2>Finance</h2>
    <p>Here I’ll share everything I know about managing money, investing, and budgeting.</p>
  </section>

  <section id="faith">
    <h2>Faith</h2>
    <p>Reflections, beliefs, and spiritual lessons I’ve learned.</p>
  </section>

  <section id="architecture">
    <h2>Architecture</h2>
    <p>My thoughts on design, form, function, and history in architecture.</p>
  </section>
</body>
</html>
